<!DOCTYPE html>
<html>

<head>
<title>Faculty Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
}

.header{
background:#343a40;
color:white;
padding:15px;
}

.table-container{
margin-top:30px;
}

.status-ok{
color:green;
font-weight:bold;
}

.status-alert{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header text-center">
<h2>Faculty Attendance Dashboard</h2>
</div>

<div class="container table-container">

<table class="table table-bordered table-hover">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Name</th>
<th>Latitude</th>
<th>Longitude</th>
<th>IP Address</th>
<th>Status</th>
<th>Time</th>
</tr>
</thead>

<tbody>

{% for row in data %}

<tr>

<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>

{% if "LEFT" in row[5] %}
<td class="status-alert">{{row[5]}}</td>
{% else %}
<td class="status-ok">{{row[5]}}</td>
{% endif %}

<td>{{row[6]}}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
